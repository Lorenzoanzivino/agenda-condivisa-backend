server:
  port: 8082

spring:
  application:
    name: calendar-service
  datasource:

    url: jdbc:postgresql://localhost:55432/agenda_db?currentSchema=calendar_schema

    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    default-schema: calendar_schema

management:
  endpoints:
    web:
      exposure:
        include: health