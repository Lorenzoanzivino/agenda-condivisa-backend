server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:55432/agenda_db?currentSchema=user_schema
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    default-schema: user_schema

management:
  endpoints:
    web:
      exposure:
        include: health