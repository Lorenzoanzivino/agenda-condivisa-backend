version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: shared-postgres
    ports:
      - "55433:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: agenda_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - agenda-network

volumes:
  pgdata:

networks:
  agenda-network:
    driver: bridge
