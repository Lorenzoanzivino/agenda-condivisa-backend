services:
  postgres-db:
    image: postgres:15-alpine
    container_name: shared-postgres
    ports:
      - "${DB_PORT:55432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - agenda-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:guest}
    networks:
      - agenda-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ../user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8081:8081"
    env_file:
      - ../.env
    environment:
      - DB_HOST=shared-postgres
      - DB_PORT=5432
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - agenda-network

  calendar-service:
    build:
      context: ../calendar-service
      dockerfile: Dockerfile
    container_name: calendar-service
    ports:
      - "8082:8082"
    env_file:
      - ../.env
    environment:
      - DB_HOST=shared-postgres
      - DB_PORT=5432
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - agenda-network

  agent-service:
    build:
      context: ../agent-service
      dockerfile: Dockerfile
    container_name: agent-service
    ports:
      - "8083:8083"
    env_file:
      - ../.env
    networks:
      - agenda-network

  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    depends_on:
      - user-service
      - calendar-service
      - agent-service
    networks:
      - agenda-network

  notification-service:
    build:
      context: ../notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    env_file:
      - ../.env
    environment:
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - agenda-network

volumes:
  pgdata:

networks:
  agenda-network:
    driver: bridge