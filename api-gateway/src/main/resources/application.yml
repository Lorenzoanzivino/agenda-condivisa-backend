server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/users/**, /api/groups/**, /api/memberships/**
          filters:
            - name: CircuitBreaker
              args:
                name: userServiceCB
                fallbackUri: forward:/fallback/user-service
            - JwtAuthenticationFilter

        - id: calendar-service
          uri: http://calendar-service:8082
          predicates:
            - Path=/api/events/**, /api/invites/**
          filters:
            - name: CircuitBreaker
              args:
                name: calendarServiceCB
                fallbackUri: forward:/fallback/calendar-service
            - JwtAuthenticationFilter

        - id: agent-service
          uri: http://agent-service:8083
          predicates:
            - Path=/api/chat/**
          filters:
            - name: JwtAuthenticationFilter

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000

metadata:
  response-timeout: 30000
  connect-timeout: 30000

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      userServiceCB:
        baseConfig: default
      calendarServiceCB:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s